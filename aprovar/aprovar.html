<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>buzzbe | Aprovação de Artes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0b1426;       
            --bg-light: #152238;      
            --brand-blue: #4285F4;    
            --brand-blue-hover: #2b6ce0;
            --success: #10B981; 
            --success-hover: #059669;
            --primary: #ffffff;
            --accent: #000000;
            --text-muted: #94a3b8;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ====== HEADER (TOPBAR) ====== */
        .topbar {
            position: sticky;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(11, 20, 38, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .logo {
            color: var(--brand-blue);
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -1px; 
        }

        .project-info {
            text-align: center;
        }

        .project-info h1 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .project-info p {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-actions button {
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .header-actions button:hover {
            color: var(--primary);
            background: rgba(255,255,255,0.05);
        }

        /* ====== GRID PRINCIPAL ====== */
        .container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .grid-header h2 {
            font-size: 24px;
            font-weight: 600;
        }

        /* O Grid das imagens */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .grid-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-light);
            aspect-ratio: 16/9; /* Mantém as miniaturas proporcionais */
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .grid-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.2);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Preenche a miniatura inteira */
            transition: transform 0.5s ease;
        }

        .grid-item:hover img {
            transform: scale(1.05);
        }

        /* Overlay escuro que aparece ao passar o mouse */
        .item-overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 20, 38, 0.7);
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
        }

        .grid-item:hover .item-overlay {
            opacity: 1;
        }

        .item-overlay span {
            background: var(--brand-blue);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            transform: translateY(10px);
            transition: transform 0.3s ease;
        }

        .grid-item:hover .item-overlay span {
            transform: translateY(0);
        }

        .item-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            z-index: 2;
        }

        /* ====== MODAL / SLIDER (APRESENTAÇÃO) ====== */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(11, 20, 38, 0.98);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Topbar do Modal */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .close-modal {
            background: transparent;
            color: white;
            border: none;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            transition: var(--transition);
        }

        .close-modal:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        /* Área central do modal (Imagem) */
        .modal-content {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 80px;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* Navegação */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .nav-arrow:hover {
            background: var(--primary);
            color: var(--accent);
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        /* Rodapé do Modal (Botões de Aprovação) */
        .modal-footer {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .slide-counter {
            background: rgba(0,0,0,0.5);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .approval-actions {
            display: flex;
            gap: 12px;
        }

        .approval-actions button {
            padding: 12px 24px;
            border: none;
            border-radius: 50px; 
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-approve {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .btn-approve:hover {
            background: var(--success-hover);
            transform: translateY(-2px);
        }

        .btn-adjust {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
        }

        .btn-adjust:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .topbar { padding: 0 20px; }
            .container { padding: 20px; }
            .modal-content { padding: 20px 0; }
            .nav-arrow { width: 40px; height: 40px; font-size: 16px; }
            .prev-btn { left: 10px; }
            .next-btn { right: 10px; }
            .modal-footer { flex-direction: column; gap: 15px; padding: 20px; }
            .approval-actions { width: 100%; }
            .approval-actions button { flex: 1; justify-content: center; }
        }
    </style>
</head>

<body>

    <header class="topbar">
        <div class="logo">buzzbe</div>
        <div class="project-info">
            <h1>Mês do Consumidor</h1>
            <p>Aprovação de Artes</p>
        </div>
        <div class="header-actions">
            <button id="fsBtn" onclick="toggleFullScreen()" title="Tela Cheia">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
            </button>
        </div>
    </header>

    <main class="container">
        <div class="grid-header">
            <h2>Peças da Campanha</h2>
            <span style="color: var(--text-muted); font-size: 14px;">Clique para expandir e aprovar</span>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            </div>
    </main>

    <div class="modal" id="presentationModal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Nome da Imagem</div>
            <button class="close-modal" onclick="closeModal()" title="Fechar (ESC)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div class="modal-content">
            <button class="nav-arrow prev-btn" onclick="prevSlide()">&#10094;</button>
            <img id="modalImage" src="" alt="Arte expandida">
            <button class="nav-arrow next-btn" onclick="nextSlide()">&#10095;</button>
        </div>

        <div class="modal-footer">
            <div class="slide-counter" id="modalCounter">1 / 8</div>
            <div class="approval-actions">
                <button class="btn-adjust" onclick="enviarWhatsApp('ajuste')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    Pedir Ajuste
                </button>
                <button class="btn-approve" onclick="enviarWhatsApp('aprovar')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Aprovar Arte
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // DADOS DAS IMAGENS
        // Adicione um nome (title) para cada imagem para identificar no WhatsApp
        // ==========================================
        const slides = [
            { src: "https://criarleal.github.io/buzzbe/aprovar/slide1.png", title: "Capa da Campanha" },
            { src: "https://criarleal.github.io/buzzbe/aprovar/slide2.png", title: "Post Carrossel 1" },
            { src: "https://criarleal.github.io/buzzbe/aprovar/slide3.png", title: "Post Carrossel 2" },
            { src: "https://criarleal.github.io/buzzbe/aprovar/slide4.png", title: "Post Carrossel 3" },
            { src: "https://criarleal.github.io/buzzbe/aprovar/slide5.png", title: "Story Promocional" },
            { src: "https://criarleal.github.io/buzzbe/aprovar/slide6.png", title: "Banner Site" },
            { src: "https://criarleal.github.io/buzzbe/aprovar/slide7.png", title: "Capa Facebook" },
            { src: "https://criarleal.github.io/buzzbe/aprovar/slide8.png", title: "Arte Final" }
        ];

        let currentIndex = 0;
        const modal = document.getElementById("presentationModal");
        const modalImage = document.getElementById("modalImage");
        const modalTitle = document.getElementById("modalTitle");
        const modalCounter = document.getElementById("modalCounter");

        // 1. GERAR O GRID DE IMAGENS NA TELA INICIAL
        function renderGrid() {
            const gridContainer = document.getElementById("galleryGrid");
            gridContainer.innerHTML = '';

            slides.forEach((slide, index) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                // Ao clicar na miniatura, abre o modal direto naquela imagem
                item.onclick = () => openModal(index);

                item.innerHTML = `
                    <img src="${slide.src}" alt="${slide.title}" loading="lazy">
                    <div class="item-label">${index + 1}</div>
                    <div class="item-overlay">
                        <span>Ver e Aprovar</span>
                    </div>
                `;
                gridContainer.appendChild(item);
            });
        }

        // 2. FUNÇÕES DO MODAL
        function openModal(index) {
            currentIndex = index;
            updateModalContent();
            modal.classList.add("active");
            document.body.style.overflow = "hidden"; // Impede rolagem da página ao fundo
        }

        function closeModal() {
            modal.classList.remove("active");
            document.body.style.overflow = "auto";
        }

        function updateModalContent() {
            const slide = slides[currentIndex];
            modalImage.src = slide.src;
            modalTitle.innerText = `Arte ${currentIndex + 1}: ${slide.title}`;
            modalCounter.innerText = `${currentIndex + 1} de ${slides.length}`;
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % slides.length;
            updateModalContent();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + slides.length) % slides.length;
            updateModalContent();
        }

        // ==========================================
        // WHATSAPP - APROVAÇÃO INDIVIDUAL
        // ==========================================
        function enviarWhatsApp(acao) {
            const numeroWhatsApp = "5511999999999"; // Coloque seu número aqui
            
            // Pega o nome da imagem atual para enviar na mensagem
            const arteAtual = slides[currentIndex].title;
            const numArte = currentIndex + 1;
            
            let mensagem = "";
            
            if(acao === 'aprovar') {
                mensagem = `✅ *ARTE APROVADA*\n\nCampanha: Mês do Consumidor\nArte ${numArte}: *${arteAtual}*\n\nPode seguir com essa!`;
            } else if (acao === 'ajuste') {
                mensagem = `✍️ *PEDIDO DE AJUSTE*\n\nCampanha: Mês do Consumidor\nArte ${numArte}: *${arteAtual}*\n\nGostaria de alterar o seguinte: \n(escreva aqui o ajuste)`;
            }

            const url = `https://api.whatsapp.com/send?phone=${numeroWhatsApp}&text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
        }

        // Inicializa o Grid ao carregar a página
        window.onload = renderGrid;

        // Controles de Teclado
        document.addEventListener("keydown", function(e) {
            if (!modal.classList.contains("active")) return; // Só funciona se o modal estiver aberto

            if (e.code === "Escape") {
                closeModal();
            }
            if (e.code === "ArrowRight") {
                nextSlide();
            }
            if (e.code === "ArrowLeft") {
                prevSlide();
            }
        });

        // Fullscreen geral
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }
    </script>

</body>
</html>
