<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzbe - Consultoria de Marketing Digital de Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #ffffff;
            color: #1a1a1a;
        }
        .text-buzz-blue { color: #4361ee; }
        .bg-buzz-blue { background-color: #4361ee; }
        .btn-primary {
            background-color: #4361ee;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #3730a3;
            transform: translateY(-2px);
        }
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .whatsapp-float:hover {
            transform: scale(1.05);
        }
        .hero-gradient {
            background: linear-gradient(rgba(13, 27, 42, 0.8), rgba(13, 27, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            color: white;
        }
    </style>
